<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessions — Smoking Puck</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <div class="page-header">
      <h1>Upcoming Sessions 🏒</h1>
      <p>Book a private 1-on-1 or 1-on-2 shooting session and level up your game.</p>
    </div>

    <div class="container">
      <div class="alert alert-error" id="loadError" style="display:none"></div>
      <div class="sessions-grid" id="sessionsGrid"></div>

      <div class="empty-state" id="emptyState" style="display:none">
        <div class="ico">🏒</div>
        <p>No upcoming sessions right now — check back soon!</p>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="sessions.js"></script>
</body>
</html>
