<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Smoking Puck</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <div class="form-card">
      <p class="form-title">🏒 Smoking Puck</p>

      <!-- GOOGLE SIGN-IN -->
      <button type="button" class="btn btn-google form-btn" id="googleBtn" style="margin-bottom:1rem">
        Continue with Google
      </button>
      <p style="text-align:center;color:#999;font-size:.8rem;margin-bottom:1rem">— or —</p>

      <div class="tabs" id="tabs">
        <button class="tab-btn active" id="tab-login"    data-tab="login">Log In</button>
        <button class="tab-btn"        id="tab-register" data-tab="register">Register</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="tab-panel active" id="panel-login">
        <div class="alert alert-error" id="login-error" style="display:none"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" required placeholder="you@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary form-btn">Log In</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.86rem;color:#666">
          No account?
          <a href="#" id="goToRegister" style="color:var(--blue-600);font-weight:700">Register here</a>
        </p>
      </div>

      <!-- REGISTER PANEL -->
      <div class="tab-panel" id="panel-register">
        <div class="alert alert-error" id="register-error" style="display:none"></div>
        <form id="registerForm">
          <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" required placeholder="Jake Smith" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" required placeholder="you@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" required placeholder="Min. 8 characters"
                   autocomplete="new-password" minlength="8" />
          </div>
          <button type="submit" class="btn btn-primary form-btn">Create Account</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.86rem;color:#666">
          Already have an account?
          <a href="#" id="goToLogin" style="color:var(--blue-600);font-weight:700">Log in</a>
        </p>
      </div>

      <!-- VERIFY EMAIL PANEL -->
      <div class="tab-panel" id="panel-verify">
        <p style="margin-bottom:1rem;color:#666;font-size:.9rem">
          We sent a verification code to <strong id="verifyEmailLabel"></strong>. Enter it below to finish creating your account.
        </p>
        <div class="alert alert-error" id="verify-error" style="display:none"></div>
        <form id="verifyForm">
          <div class="form-group">
            <label for="verifyCode">Verification Code</label>
            <input type="text" id="verifyCode" required placeholder="123456" inputmode="numeric" autocomplete="one-time-code" />
          </div>
          <button type="submit" class="btn btn-primary form-btn">Verify &amp; Continue</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.86rem;color:#666">
          Didn't get a code? <a href="#" id="resendCode" style="color:var(--blue-600);font-weight:700">Resend</a>
        </p>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="login.js"></script>
</body>
</html>
