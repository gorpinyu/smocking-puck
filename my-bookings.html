<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings — Smoking Puck</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <div class="page-header">
      <h1>My Bookings 📅</h1>
      <p>Your upcoming hockey shooting sessions.</p>
    </div>

    <div class="container">
      <div class="bookings-list" id="bookingsList"></div>

      <div class="empty-state" id="emptyState" style="display:none">
        <div class="ico">📅</div>
        <p>
          You haven't booked any sessions yet.<br>
          <a href="sessions.html" style="color:var(--blue-600);font-weight:700">Browse sessions →</a>
        </p>
      </div>
    </div>

    <div class="container">
      <div class="page-header" style="text-align:left;padding-top:0">
        <h2>My History</h2>
        <p>A record of your booking activity, including cancelled sessions.</p>
      </div>
      <div id="historyWrap"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="my-bookings.js"></script>
</body>
</html>
